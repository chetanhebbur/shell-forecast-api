name: Shell API — CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: PYTHONPATH=. pytest tests/test_api.py -v

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Instance
        run: |
          az container delete \
            --resource-group data_Ai_project \
            --name shell-forecast-api \
            --yes || true

          az container create \
            --resource-group data_Ai_project \
            --name shell-forecast-api \
            --image mcr.microsoft.com/devcontainers/python:3.11 \
            --cpu 1 \
            --memory 1.5 \
            --ports 8000 \
            --ip-address public \
            --os-type Linux \
            --location eastus \
            --dns-name-label shell-forecast-api \
            --environment-variables PYTHONPATH=/app \
            --command-line "bash -c 'apt-get update && apt-get install -y git && git clone https://github.com/chetanhebbur/shell-forecast-api.git /app && cd /app && pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000'"

      - name: Verify deployment
        run: |
          sleep 120
          curl http://shell-forecast-api.eastus.azurecontainer.io:8000/health
